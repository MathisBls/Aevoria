name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  BRANCH: ${{ github.ref_name }}

jobs:
  ui:
    name: UI Library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint UI package
        env:
          BRANCH: ${{ github.ref_name }}
          ESLINT_STRICT: ${{ github.ref_name == 'main' && 'true' || 'false' }}
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            npm run lint --workspace=@aevoria/ui -- --max-warnings=0
          else
            npm run lint --workspace=@aevoria/ui
          fi
      
      - name: Build UI package
        run: npm run build

  app:
    name: App
    runs-on: ubuntu-latest
    needs: ui
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build UI package
        run: npm run build
      
      - name: Lint App
        env:
          BRANCH: ${{ github.ref_name }}
          ESLINT_STRICT: ${{ github.ref_name == 'main' && 'true' || 'false' }}
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            npm run lint --workspace=aevoria-app -- --max-warnings=0
          else
            npm run lint:app
          fi
      
      - name: Lint SCSS App
        run: npm run lint:scss:app
      
      - name: Build App
        run: npm run build:app

  admin:
    name: Admin
    runs-on: ubuntu-latest
    needs: ui
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build UI package
        run: npm run build
      
      - name: Lint Admin
        env:
          BRANCH: ${{ github.ref_name }}
          ESLINT_STRICT: ${{ github.ref_name == 'main' && 'true' || 'false' }}
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            npm run lint --workspace=aevoria-admin -- --max-warnings=0
          else
            npm run lint:admin
          fi
      
      - name: Lint SCSS Admin
        run: npm run lint:scss:admin
      
      - name: Build Admin
        run: npm run build:admin

  back:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install backend services dependencies
        run: npm run install:services
      
      - name: Lint Backend
        env:
          BRANCH: ${{ github.ref_name }}
          ESLINT_STRICT: ${{ github.ref_name == 'main' && 'true' || 'false' }}
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            npm run lint --workspace=back -- --max-warnings=0
          else
            npm run lint:back
          fi
      
      - name: Build Backend
        run: npm run build:back
